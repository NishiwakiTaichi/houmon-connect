services:
  - type: web
    name: houmon-connect
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: houmon-connect-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: CHATWORK_API_TOKEN
        sync: false
      - key: CHATWORK_ROOM_ID
        sync: false

databases:
  - name: houmon-connect-db
    databaseName: houmon_connect_production
    plan: free
